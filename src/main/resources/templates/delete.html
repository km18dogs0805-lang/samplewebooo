<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
  rel="stylesheet"
  integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
  crossorigin="anonymous">
    <title>Delete_Person</title>
</head>
<body class="container">
    <h1 class="display-4 mb-4" th:text="${title}"></h1>
    <p th:text="${msg}"></p>
    <form method="post" action="/delete" th:object="${formModel}">
        <input type="hidden" name="id" th:value="*{id}" />
        <ul>
            <li>名前：  <span th:text="*{name}"></span></li>
            <li>メール：  <span th:text="*{mail}"></span></li>
            <li>年齢：  <span th:text="*{age}"></span></li>
        </ul>
        <input type="submit" class="btn btn-primary" value="Delete" />
    </form>
</body>
</html>
