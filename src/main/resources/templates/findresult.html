<!DOCTYPE html>
<html lang="ja">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Boostrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>FindResult_Page</title>

</head>

<body class="container">

    <div class="mt-5">

        <h1>在庫リスト</h1>

        <!-- 検索フォーム -->
        <form action="/findresult" method="get">
            
            <!-- 検索キーワードの入力欄 -->
            <div class="mb-3">

                <label for="search" class="form-label">検索キーワード：</label>
                <input type="text" class="form-control" id="search" name="find_str" />

            </div>

            <!-- 検索ボタン -->
            <button type="submit" class="btn btn-primary">検索</button>

        </form>

        <br>

        <!-- 戻るボタン -->
        <a href="/" class="btn btn-secondary">戻る</a>

    </div>

    <!-- 検索結果の表示 -->
    <div class="mt-5">

        <h2>検索結果</h2>

        <table class="table table-striped">

            <thead>
                <!-- テーブルの見出し -->
                <tr>
                    <th>ID</th>
                    <th>タイトル</th>
                    <th>価格</th>
                    <th>数量</th>
                </tr>
            </thead>

            <!-- テーブルの内容 -->
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.id}">1</td>
                    <td th:text="${item.title}">商品A</td>
                    <td th:text="${item.price}">1000</td>
                    <td th:text="${item.quantity}">10</td>
                </tr>
            </tbody>

        </table>
    
</body>
</html>
