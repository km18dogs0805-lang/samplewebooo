<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Main_Page</title>
</head>
<body class="container">
    <h1 th:text="${title}">メインページ</h1>
    <form method="post" action="result" th:object="${formModel}">
        <!-- コンテンツのタイトル -->
        <div class="mb-3">
            <label for="name" class="form-label">タイトル：</label>
            <input type="text" class="form-control" name="name" th:value="${name}" /> 
        </div>
        <!-- 価格 -->
        <div class="mb-3">
            <label for="price" class="form-label">価格：</label>
            <input type="text" class="form-control" name="price" th:value="${price}" /> 
        </div>
        <!-- 数量 -->
         <div class="mb-3">
            <label for="volume" class="form-label">数量：</label>
            <input type="number" class="form-control" name="volume" th:value="${volume}" />
         </div>
        <tr>
                <td><input type="submit" class="btn btn-primary px-4" value="Create" /></td>
                <td><input type="button" class="btn btn-primary px-4" onclick="deleteOfList()" value="Delete" /></td>
                <!-- 合計ボタンを追加 formationとは、フォームの送信先を指定する属性 -->
                <td><input type="submit" class="btn btn-primary px-4" formaction="/sum_result" value="合計" /></td>
        </tr>
        
    </form>

    <!-- 投稿コンテンツ表示テーブル -->
    <table class="table">
        <thead>
            <tr>
                <th>ID</th>
                <th>タイトル</th>
                <th>価格（￥）</th>
                <th>数量</th>
            </tr>
        </thead>
        <!-- データを表示するテーブル -->
        <tbody>
            <tr th:each="item : ${data}" class="item_list">
                <td th:text="${item.id}"></td>
                <td th:text="${item.name}"></td>
                <td th:text="${item.price}"></td>
                <td th:text="${item.volume}"></td>
                <td class="delete_button" style="display: none;">
                    <form method="post" th:action="@{'delete_result/' + ${item.id}}">
                        <input type="submit" class="btn btn-danger px-4" value="Delete" />
                    </form>
                </td>
            </tr>
        </tbody>
    </table>
    <script th:inline="javascript">
        // Deleteボタンがクリックされたとき、削除ボタンが出現する処理
        function deleteOfList() {
            // 削除ボタンを表示
            const deleteButtons = document.querySelectorAll('.delete_button');
            // Deleteボタンを押下したとき、削除ボタンを表示する
            deleteButtons.forEach(button => {
                // table-cellとは、表のセルを意味する値で、これを指定することで、削除ボタンがテーブルのセルとして表示されるようになる。
                button.style.display = 'table-cell';

            });
        }

        // 削除ボタンがクリックされたとき、テーブルからデータを削除する処理
        function deleteList() {

            // テーブルからデータを削除
            const itemList = document.querySelectorAll('.item_list');
            
            // listから削除（Listには、id、タイトル、価格、数量が入っている）
            itemList.forEach(item => {

                item.remove();

            });
        }
    </script>
</body>
</html>
