<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Rakuten_Page</title>
</head>
<body class="container">
    <header id="header">
        <div class="header_container">
            <h1>楽天で検索</h1>
            <div class="humburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <nav>
                <ul class="nav_list">
                    <li><a href="/">Myページ</a></li>
                    <li><a href="/findresult">検索する</a></li>
                    <li><a href="/rakuten">楽天で検索</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- ✅ action削除・JS側でsubmitを制御 -->
    <form id="searchForm" class="mb-4">
        <div class="input-group input-group-lg">
            <input
                type="text"
                class="form-control"
                id="keyword"
                name="keyword"
                placeholder="商品名を入力（例：コーヒー、ノート）"
                required
            />
            <button class="btn btn-danger text-white px-4" id="kensaku" type="submit">
                🔍 検索
            </button>
        </div>
    </form>

    <!-- ローディング表示 -->
    <div id="loading" class="text-center my-3 d-none">
        <div class="spinner-border text-danger" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>

    <!-- エラー表示 -->
    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <table class="table table-striped mt-4">
        <thead>
            <tr>
                <th>商品名</th>
                <th>価格</th>
                <th>URL</th>
            </tr>
        </thead>
        <tbody id="resultsBody">
            <!-- 検索結果がここに挿入される -->
        </tbody>
    </table>

    <script>
        // ハンバーガーメニュー
        document.querySelector('.humburger').addEventListener('click', function () {
            this.classList.toggle('active');
            document.querySelector('.nav_list').classList.toggle('active');
        });

       
    </script>
</body>
</html>
