<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- BootstrapのCSSを読み込む -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Rakuten_Page</title>
</head>

<body class="container">

    <header id="header">
        
        <div class="header_container">

            <h1>楽天で検索</h1>

            <!-- ハンバーガーメニュー -->
            <div class="humburger">
                <span></span>
                <span></span>
                <span></span>
            </div>

            <!-- ナビゲーションメニュー -->
            <nav>
                <ul class="nav_list">
                    <li><a href="/">Myページ</a></li>
                    <li><a href="/findresult">検索する</a></li>
                    <li><a href="/rakuten">楽天で検索</a></li>
                </ul>
            </nav>

        </div> <!-- header_container -->

    </header>

        <!-- 検索フォーム -->
    <form method="post" action="/rakuten" class="mb-4">
        <div class="input-group input-group-lg">
            <input
                type="text"
                class="form-control"
                name="keyword"
                th:value="${keyword}"
                placeholder="商品名を入力（例：コーヒー、ノート）"
                required
            />
            <button class="btn rakuten-red text-white px-4" type="submit">
                🔍 検索
            </button>
        </div>
    </form>


    
</body>
</html>
